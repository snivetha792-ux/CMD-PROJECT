<!DOCTYPE html>
<html>

<head>
    <title>Patient Registration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fc;
        }

        .register-container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #1E3A8A;
        }

        h2 {
            text-align: center;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1D4ED8;
        }

        #message {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <button class="back-button" onclick="goBack('index.html')">Back</button>

    <div class="register-container">

        <h1>CMD Hospital</h1>

        <h2>Patient Registration</h2>

        <form id="registerForm">

            <input type="text" id="name" placeholder="Full Name" required>

            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input type="tel" id="phone" placeholder="Phone Number" required>

            <input type="email" id="email" placeholder="Email Address (Optional)">

            <input type="text" id="address" placeholder="Address">

            <input type="password" id="password" placeholder="Password (Example: abcdef1234)" required>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a href="index.html">Login Here</a>
        </p>

        <p id="message"></p>

    </div>

    <script src="back.js"></script>
    <script>
        document
            .getElementById("registerForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                let password =
                    document.getElementById("password").value;

                let confirmPassword =
                    document.getElementById("confirmPassword").value;

                let pattern =
                    /^[A-Za-z]{6}\d{4}$/;

                if (!pattern.test(password)) {
                    alert(
                        "Password must be 6 alphabets and 4 numbers (Example: abcdef1234)"
                    );
                    return;
                }

                if (password !== confirmPassword) {
                    alert("Passwords do not match");
                    return;
                }

                const patient = {
                    name: document.getElementById("name").value,
                    age: document.getElementById("age").value,
                    gender: document.getElementById("gender").value,
                    phone: document.getElementById("phone").value,
                    email: document.getElementById("email").value,
                    address: document.getElementById("address").value,
                    password
                };

                try {
                    const response = await fetch("http://localhost:5000/api/patients", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(patient)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        document.getElementById("message").innerHTML =
                            data.message || "Registration failed";
                        return;
                    }

                    document.getElementById("message").innerHTML =
                        `Registration Successful. Patient ID: ${data.patient.patientId}`;
                    document.getElementById("registerForm").reset();
                } catch (error) {
                    document.getElementById("message").innerHTML =
                        "Backend server is not connected";
                }
            });
    </script>

</body>

</html>
